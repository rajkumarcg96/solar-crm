<!DOCTYPE html>
<html>
<head>
    <title>Solar CRM - Login</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; }
        input, button { width: 100%; padding: 10px; margin-top: 15px; border-radius: 5px; box-sizing: border-box; }
        input { border: 1px solid #ccc; font-size: 16px; }
        button { background: #0b2b53; color: white; border: none; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #fcd814; color: #0b2b53; }
        #msg { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-box">
    <h2 style="text-align: center; color: #0b2b53;">User Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">LOGIN</button>
    <p id="msg"></p>
</div>

<script>
    function login() {
        var user = document.getElementById("username").value;
        var pass = document.getElementById("password").value;
        var msgBox = document.getElementById("msg");

        if(user === "" || pass === "") {
            msgBox.style.color = "red";
            msgBox.innerText = "कृपया Username और Password डालें!";
            return;
        }

        msgBox.innerText = "Checking...";
        msgBox.style.color = "blue";

        // !! अपना नया Web App URL यहाँ डालें !!
        var API_URL = "https://script.google.com/macros/s/AKfycbzm8fI93prI4e3V99AiwbAZAc7IYauubuBALQzxC-zgz4e62iNxbhH82-URMFKhpAmH/exec"; 

        var payload = { "action": "login", "username": user, "password": pass };

        fetch(API_URL, { method: "POST", body: JSON.stringify(payload) })
        .then(response => response.json())
        .then(data => {
            if(data.status === "Success") {
                msgBox.style.color = "green";
                msgBox.innerText = "Welcome " + data.employeeName + "!";
                localStorage.setItem("empName", data.employeeName);
                localStorage.setItem("userRole", data.role);
                window.location.href = "dashboard.html"; // डैशबोर्ड पर भेजें
            } else {
                msgBox.style.color = "red";
                msgBox.innerText = data.message;
            }
        })
        .catch(error => {
            msgBox.style.color = "red";
            msgBox.innerText = "सिस्टम एरर! कृपया दोबारा प्रयास करें।";
        });
    }
</script>
</body>
</html>
